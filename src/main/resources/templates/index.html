<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Service Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #1E3A5F 0%, #2C4A73 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container-box {
            width: 100%;
            max-width: 1000px;
            height: auto;
            min-height: 550px;
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.8s ease-in-out;
        }

        .left {
            width: 55%;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            position: relative;
        }

        .left h1 {
            font-size: 38px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .left p {
            font-size: 16px;
            line-height: 1.6;
            color: #E2E8F0;
        }

        .buttons {
            margin-top: 35px;
            display: flex;
            gap: 15px;
        }

        .buttons a {
            text-decoration: none;
            padding: 12px 30px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 15px;
            transition: var(--transition);
        }

        .btn-login {
            background-color: white;
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        .btn-login:hover {
            background-color: #E2E8F0;
            transform: translateY(-2px);
        }

        .btn-reg {
            border: 2px solid white;
            color: white;
        }

        .btn-reg:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .right {
            width: 45%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-app);
            padding: 40px;
        }

        .icon-box {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(30, 58, 95, 0.2);
        }

        .service {
            width: 90%;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
            padding: 12px 20px;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .service:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-md);
        }

        .service i {
            color: var(--primary-light);
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .service span {
            font-weight: 500;
            font-size: 14px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .container-box {
                flex-direction: column;
            }
            .left, .right {
                width: 100%;
                padding: 30px;
            }
            .left {
                min-height: 250px;
            }
        }
    </style>
</head>
<body>

<div class="container-box">
    <div class="left">
        <h1>Local Service Connect</h1>
        <p>
            Find trusted photographers, decorators, caterers, DJs, and makeup artists for your events. Book verified vendors quickly and manage your bookings with ease.
        </p>
        <div class="buttons">
            <a href="/login" class="btn-login">Login</a>
            <a href="/register" class="btn-reg">Register</a>
        </div>
        <div class="footer">
            © 2026 Local Service Connect
        </div>
    </div>

    <div class="right">
        <div class="icon-box">
            <i class="fa-solid fa-handshake"></i>
        </div>
        <div class="service">
            <i class="fa fa-camera"></i> <span>Photographer</span>
        </div>
        <div class="service">
            <i class="fa fa-utensils"></i> <span>Caterer</span>
        </div>
        <div class="service">
            <i class="fa fa-palette"></i> <span>Decorator</span>
        </div>
        <div class="service">
            <i class="fa fa-music"></i> <span>DJ</span>
        </div>
        <div class="service">
            <i class="fa fa-heart"></i> <span>Makeup Artist</span>
        </div>
    </div>
</div>

</body>
</html>
