<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Service Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            background:whitesmoke;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container-box{
            width:90%;
            max-width:1100px;
            height:600px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            display:flex;
            box-shadow:0 15px 40px rgba(0,0,0,.2);
        }

        .left{
            width:55%;
            background:#405570;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            padding:60px;
        }

        .left h1{
            font-size:42px;
            margin-bottom:20px;
        }

        .left p{
            font-size:18px;
            line-height:1.7;
        }

        .buttons{
            margin-top:35px;
        }

        .buttons a{
            text-decoration:none;
            padding:12px 28px;
            border-radius:8px;
            margin-right:15px;
            font-weight:bold;
        }

        .login{
            border:2px solid white;
            color:white;
        }

        .register{
            border:2px solid white;
            color:white;
        }

        .right{
            width:45%;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            background:#f7f9fc;
        }

        .icon-box{
            width:110px;
            height:110px;
            border-radius:50%;
            background:#405570;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:45px;
            margin-bottom:30px;
        }

        .service{
            width:80%;
            display:flex;
            justify-content:space-between;
            margin:12px 0;
            padding:12px 18px;
            background:white;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,.1);
        }

        .service i{
            color:#405570;
            font-size:22px;
        }

        .footer{
            position:absolute;
            bottom:15px;
            color:white;
            font-size:14px;
        }

    </style>

</head>
<body>

<div class="container-box">

    <div class="left">

        <h1>Local Service Connect</h1>

        <p>
            Find trusted photographers, decorators,
            caterers, DJs and makeup artists for your
            events. Book verified vendors quickly and
            manage your bookings with ease.
        </p>

        <div class="buttons">

            <a href="/login" class="login">
                Login
            </a>

            <a href="/register" class="register">
                Register
            </a>

        </div>

    </div>

    <div class="right">

        <div class="icon-box">
            <i class="fa-solid fa-handshake"></i>
        </div>

        <div class="service">
            <span><i class="fa fa-camera"></i> Photographer</span>
        </div>

        <div class="service">
            <span><i class="fa fa-utensils"></i> Caterer</span>
        </div>

        <div class="service">
            <span><i class="fa fa-palette"></i> Decorator</span>
        </div>

        <div class="service">
            <span><i class="fa fa-music"></i> DJ</span>
        </div>

        <div class="service">
            <span><i class="fa fa-heart"></i> Makeup Artist</span>
        </div>

    </div>

</div>

<div class="footer">
    © 2026 Local Service Connect
</div>

</body>
</html>
