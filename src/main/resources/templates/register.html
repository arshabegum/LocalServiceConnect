<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Local Service Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <style>
        body {
            background: linear-gradient(135deg, #1E3A5F 0%, #2C4A73 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            background: #FFFFFF;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease-out;
        }
        .brand-icon {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 16px rgba(30, 58, 95, 0.2);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="brand-icon">
        <i class="fa-solid fa-user-plus"></i>
    </div>

    <h3 class="text-center fw-bold mb-4" style="color: var(--primary); font-family: 'Poppins', sans-serif;">Create Account</h3>

    <!-- Flash Error Alert -->
    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorMessage}">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form action="/users/register" method="post" class="form-custom">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="fullName" class="form-control" placeholder="fullname" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="email" required autocomplete="email">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phoneNumber" class="form-control" placeholder="Phone Number" required autocomplete="tel">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="password" required autocomplete="new-password">
        </div>

        <div class="mb-4">
            <label class="form-label">Register As</label>
            <select name="role" class="form-select">
                <option value="CUSTOMER">Customer (Search & Book Vendors)</option>
                <option value="VENDOR">Vendor (Offer Event Services)</option>
            </select>
        </div>

        <button type="submit" class="btn-custom btn-custom-primary w-100 py-2.5 mb-3 fs-6">Register Account</button>
    </form>

    <div class="text-center mt-3">
        <p class="text-muted mb-2">Already have an account? <a href="/login" class="fw-semibold text-decoration-none" style="color: var(--primary-light);">Login Here</a></p>
        <hr class="text-muted my-3">
        <a href="/" class="fw-semibold text-decoration-none" style="color: var(--accent);"><i class="fa fa-arrow-left me-1"></i> Back to Home</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
