<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Local Service Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 480px;
            transition: all 0.3s ease;
        }
        .register-card:hover {
            transform: translateY(-5px);
        }
        .brand-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #11998e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.3);
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ced4da;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 0.25rem rgba(17, 153, 142, 0.15);
        }
        .btn-success {
            background-color: #11998e;
            border-color: #11998e;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-success:hover {
            background-color: #0f8076;
            border-color: #0f8076;
        }
        .back-link {
            text-decoration: none;
            color: #11998e;
            font-weight: 500;
        }
        .back-link:hover {
            color: #0f8076;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="brand-icon">
        <i class="fa-solid fa-user-plus"></i>
    </div>
    
    <h3 class="text-center fw-bold mb-4" style="color: #11998e;">Create Account</h3>

    <!-- Flash Error Alert -->
    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorMessage}">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form action="/users/register" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Full Name</label>
            <input type="text" name="fullName" class="form-control" placeholder="Enter Full Name" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="Enter Email" required autocomplete="email">
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Phone Number</label>
            <input type="tel" name="phoneNumber" class="form-control" placeholder="Enter Phone Number" required autocomplete="tel">
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create Password" required autocomplete="new-password">
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold text-muted">Register As</label>
            <select name="role" class="form-select">
                <option value="CUSTOMER">Customer (Search & Book Vendors)</option>
                <option value="VENDOR">Vendor (Offer Event Services)</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success mb-3">Register</button>
    </form>

    <div class="text-center mt-3">
        <p class="text-muted mb-0">Already have an account? <a href="/login" class="back-link">Login Here</a></p>
        <hr class="text-muted">
        <a href="/" class="back-link"><i class="fa fa-arrow-left me-1"></i> Back to Home</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
