<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Local Service Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            transition: all 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
        .brand-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #1e3c72;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ced4da;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #1e3c72;
            box-shadow: 0 0 0 0.25rem rgba(30, 60, 114, 0.15);
        }
        .btn-primary {
            background-color: #1e3c72;
            border-color: #1e3c72;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #2a5298;
            border-color: #2a5298;
        }
        .back-link {
            text-decoration: none;
            color: #1e3c72;
            font-weight: 500;
        }
        .back-link:hover {
            color: #2a5298;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-icon">
        <i class="fa-solid fa-handshake"></i>
    </div>
    
    <h3 class="text-center fw-bold mb-4" style="color: #1e3c72;">Login</h3>

    <!-- Error & Success Messages -->
    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorMessage}">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${successMessage}">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="alert alert-info alert-dismissible fade show" role="alert" th:if="${param.logout}">
        <span>You have been logged out successfully.</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="alert alert-warning alert-dismissible fade show" role="alert" th:if="${param.error}">
        <span th:text="${param.error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form action="/login" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="Enter Email" required autocomplete="email">
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-semibold text-muted">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter Password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary mb-3">Login</button>
    </form>

    <div class="text-center mt-3">
        <p class="text-muted mb-0">Don't have an account? <a href="/register" class="back-link">Register Here</a></p>
        <hr class="text-muted">
        <a href="/" class="back-link"><i class="fa fa-arrow-left me-1"></i> Back to Home</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
