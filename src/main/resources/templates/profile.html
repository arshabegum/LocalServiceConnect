<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Local Service Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .profile-img {
            font-size: 80px;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3><i class="fa-solid fa-handshake"></i> <span>Service Connect</span></h3>
    <a href="/dashboard"><i class="fa fa-home"></i> <span>Home</span></a>
    <a href="/admin/vendors" th:if="${user.role == 'ADMIN'}"><i class="fa fa-user-gear"></i> <span>Manage Vendors</span></a>
    <a href="/profile" class="active" th:if="${user.role != 'ADMIN'}"><i class="fa fa-user"></i> <span>My Profile</span></a>
    <a href="/vendors/availability" th:if="${user.role == 'VENDOR'}"><i class="fa fa-calendar-days"></i> <span>Manage Availability</span></a>
    <a href="/search-vendor" th:if="${user.role == 'CUSTOMER'}"><i class="fa fa-search"></i> <span>Search Vendors</span></a>
    <a href="/bookings"><i class="fa fa-calendar"></i> <span>Bookings</span></a>
    <a href="/reviews"><i class="fa fa-star"></i> <span>Reviews</span></a>
    <a href="/contact"><i class="fa fa-phone"></i> <span>Contact</span></a>
    <a href="/logout"><i class="fa fa-right-from-bracket"></i> <span>Logout</span></a>
</div>

<div class="content">
    
    <div class="container-fluid px-0">
        
        <!-- Alerts -->
        <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${successMessage}">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorMessage}">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            
            <!-- User Core Profile Card -->
            <div class="col-md-6 mb-4">
                <div class="app-card form-custom">
                    <div class="text-center mb-4">
                        <i class="fa fa-user-circle profile-img"></i>
                        <h4 class="mt-2 fw-bold" th:text="${user.fullName}">Full Name</h4>
                        <span class="badge bg-primary px-3 py-2" th:text="${user.role}">Role</span>
                    </div>
                    
                    <form action="/users/profile/update" method="post">
                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label>Email (Unchangeable)</label>
                            <input type="email" class="form-control bg-light" th:value="${user.email}" readonly>
                        </div>
                        
                        <div class="mb-3">
                            <label>Phone Number</label>
                            <input type="text" name="phoneNumber" class="form-control" th:value="${user.phoneNumber}" required>
                        </div>
                        
                        <div class="mb-4">
                            <label>New Password (Leave blank to keep current)</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter New Password">
                        </div>
                        
                        <button type="submit" class="btn-custom btn-custom-primary w-100 py-2.5">Save Profile Details</button>
                    </form>
                </div>
            </div>

            <!-- Vendor Business Profile Card (Only for Vendors) -->
            <div class="col-md-6 mb-4" th:if="${user.role == 'VENDOR'}">
                <div class="app-card form-custom" th:if="${vendor != null}">
                    <h4 class="fw-bold mb-4 text-center text-primary" style="font-family: 'Poppins', sans-serif;"><i class="fa-solid fa-briefcase me-2"></i>Business Settings</h4>
                    
                    <form action="/vendors/profile/update" method="post">
                        <div class="mb-3">
                            <label>Business / Shop Name</label>
                            <input type="text" name="businessName" class="form-control" th:value="${vendor.businessName}" required>
                        </div>

                        <div class="mb-3">
                            <label>Service Category</label>
                            <select name="serviceType" class="form-select" required>
                                <option value="Photographer" th:selected="${vendor.serviceType == 'Photographer'}">Photographer</option>
                                <option value="Caterer" th:selected="${vendor.serviceType == 'Caterer'}">Caterer</option>
                                <option value="Decorator" th:selected="${vendor.serviceType == 'Decorator'}">Decorator</option>
                                <option value="DJ" th:selected="${vendor.serviceType == 'DJ'}">DJ</option>
                                <option value="Makeup Artist" th:selected="${vendor.serviceType == 'Makeup Artist'}">Makeup Artist</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Starting Price per Day (₹)</label>
                            <input type="number" step="0.01" name="price" class="form-control" th:value="${vendor.price}" required>
                        </div>

                        <div class="mb-3">
                            <label>City / Location</label>
                            <input type="text" name="city" class="form-control" th:value="${vendor.city}" required>
                        </div>

                        <div class="mb-3">
                            <label>About / Description</label>
                            <textarea name="description" class="form-control" rows="3" th:text="${vendor.description}" placeholder="Write some lines about your service..."></textarea>
                        </div>

                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" name="availabilityStatus" value="true" id="availabilityCheck" th:checked="${vendor.availabilityStatus}">
                            <label class="form-check-label text-muted" for="availabilityCheck">
                                Mark as Available for Bookings
                            </label>
                        </div>

                        <button type="submit" class="btn-custom btn-custom-success w-100 py-2.5">Save Business Settings</button>
                    </form>
                </div>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
